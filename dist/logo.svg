  <!-- Connecting Lines -->
  <path d="M20 4V15" stroke="url(#logo-grad)" stroke-width="1.5" stroke-linecap="round" opacity="0.6" />
  <path d="M20 36V25" stroke="url(#logo-grad)" stroke-width="1.5" stroke-linecap="round" opacity="0.6" />
